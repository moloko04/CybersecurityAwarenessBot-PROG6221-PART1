name: Build Cybersecurity Awareness Bot

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    
    - name: Build Part 1 (Console - .NET Framework)
      run: msbuild CybersecurityAwarenessBot.csproj /p:Configuration=Release /p:Platform="AnyCPU" /verbosity:minimal
    
    - name: Build Part 2 (WPF - .NET 8.0)
      run: dotnet build Part2-GUI/CybersecurityBot.GUI.csproj --configuration Release
